{% extends "base.html" %}

{% block title %}Add Task - ToDo App{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2 class="mb-4">Add New Task</h2>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Create Task</button>
      </form>
    </div>
  </div>
{% endblock %}
